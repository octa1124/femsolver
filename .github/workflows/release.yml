name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version to render release notes for, e.g. v0.1.0
        required: true
        type: string
  push:
    tags:
      - "v*"

jobs:
  release-notes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install PyYAML
      - name: Validate changelog fragments
        run: python tools/scripts/check_changelog.py --directory changes/unreleased
      - name: Render release notes
        run: |
          VERSION_INPUT="${{ github.event.inputs.version }}"
          if [ -z "$VERSION_INPUT" ]; then
            VERSION_INPUT="${GITHUB_REF_NAME}"
          fi
          python tools/release/render_release_notes.py \
            --version "$VERSION_INPUT" \
            --output release-notes.md
      - name: Upload release notes artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-notes
          path: release-notes.md
